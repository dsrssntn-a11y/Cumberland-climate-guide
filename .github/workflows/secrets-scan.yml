name: Secrets Scan
on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 0'

jobs:
  gitleaks:
    name: Scan repository for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks secret scan
        uses: zricethezav/gitleaks-action@v4
        with:
          args: '--source=${{ github.workspace }} --verbose --redact'
